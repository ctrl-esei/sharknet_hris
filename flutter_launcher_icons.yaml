flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/sharknet_hris_app_icon.png
  min_sdk_android: 24

  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/icons/sharknet_hris_adaptive_foreground.png
  adaptive_icon_foreground_inset: 14

  remove_alpha_ios: true
  background_color_ios: "#FFFFFF"

  web:
    generate: true
    image_path: assets/icons/sharknet_hris_app_icon.png
    background_color: "#FFFFFF"
    theme_color: "#1554DC"

  macos:
    generate: true
    image_path: assets/icons/sharknet_hris_app_icon.png
